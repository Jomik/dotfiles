# ==============================================================================
# Shell
# ==============================================================================
shell            /opt/homebrew/bin/fish
macos_option_as_alt yes

# ==============================================================================
# Theme (change with: kitten themes)
# ==============================================================================
include current-theme.conf

# ==============================================================================
# Layouts — splits is the primary layout
# ==============================================================================
enabled_layouts splits,stack

# ==============================================================================
# Splits: create
# ==============================================================================
map cmd+|       launch --location=vsplit --cwd=current
map cmd+-       launch --location=hsplit --cwd=current

# ==============================================================================
# Splits: focus
# ==============================================================================
map ctrl+shift+left  neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up    neighboring_window up
map ctrl+shift+down  neighboring_window down

# ==============================================================================
# Splits: resize
# ==============================================================================
map ctrl+shift+opt+left  resize_window narrower 4
map ctrl+shift+opt+right resize_window wider 4
map ctrl+shift+opt+up    resize_window taller 4
map ctrl+shift+opt+down  resize_window shorter 4

# Toggle zoom (stack layout) for current split
map cmd+shift+z toggle_layout stack

# ==============================================================================
# Tabs
# ==============================================================================
tab_bar_filter session:~ or session:^$

map cmd+t       new_tab_with_cwd
map cmd+w       close_tab
map cmd+1       goto_tab 1
map cmd+2       goto_tab 2
map cmd+3       goto_tab 3
map cmd+4       goto_tab 4
map cmd+5       goto_tab 5

# ==============================================================================
# Sessions
# ==============================================================================

# Sessions
map ctrl+shift+s>p launch --type=overlay /opt/homebrew/bin/bash /Users/dkjohoda/.config/kitty/scripts/kitty-list-sessions.sh
map ctrl+shift+s>a goto_session -1
map ctrl+shift+s>s goto_session ~/.config/kitty/sessions/scratchpad.kitty-session

# Always start in scratchpad session
startup_session ~/.config/kitty/sessions/scratchpad.kitty-session

# ==============================================================================
# Misc
# ==============================================================================
scrollback_lines 50000
copy_on_select   no
enable_audio_bell no
visual_bell_duration 0.1

# Open URLs with click
mouse_map cmd+left click ungrabbed mouse_handle_click link

# Quick close split
map cmd+shift+w close_window

# Scrollback in pager (searchable)
map cmd+shift+h show_scrollback

# Remote control (needed for scripting/kittens)
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

# Open URLs via hints (handles wrapped URLs)
map ctrl+shift+e open_url_with_hints

# BEGIN_KITTY_FONTS
font_family      family='IosevkaTerm Nerd Font Mono' postscript_name=IosevkaTermNFM
font_size        16
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
